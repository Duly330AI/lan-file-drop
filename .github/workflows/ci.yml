name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore LanFileDrop.sln

      - name: Verify formatting
        run: dotnet format LanFileDrop.sln --verify-no-changes

      - name: Build
        run: dotnet build LanFileDrop.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test LanFileDrop.sln --configuration Release --no-build
